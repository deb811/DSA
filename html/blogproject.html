<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Recipes</title>
  <link rel="stylesheet" href="style1.css" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h2 class="header_title">CodeHelp Blogs</h2>
        <p class="header_des">Lorem ipsum dolor sit amet consectetur adipisicing elit. Laudantium, et.</p>
      </div>
    </header>

    <main class="major_container">
      <div class="card_container">
        <a href="#" class="card_image_container">
          <img
            src="https://plus.unsplash.com/premium_photo-1665657351698-7d61f4b57ddc?q=80&w=2080"
            alt="blog image"
            class="card_image"
          />
        </a>

        <div class="card_title_container">
          <a href="#">
            <h2 class="card_title">Hello World</h2>
          </a>
          <p class="container_description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Nemo, facere.</p>

          <div class="foot_container">
            <div class="author_container">
              <div class="author_image">
                <img
                  src="https://plus.unsplash.com/premium_photo-1665657351698-7d61f4b57ddc?q=80&w=2080"
                  alt="author"
                  width="100%"
                  height="100%"
                />
              </div>
              <div class="author_info">
                <span class="author_maam">Robert</span>
                <span class="author_date">12.04.2000</span>
              </div>
            </div>

            <div class="tag_container">
              <span>Summit</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
